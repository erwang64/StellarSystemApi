#Database
spring.datasource.driverClassName = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/stellarsystemapi
spring.datasource.username = root
spring.datasource.password = root

#Generation database by model
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl

#Logging
logging.level.root=WARN
logging.level.edu.esiea.stellarsystemapi.controllers=DEBUG